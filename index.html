<head>

    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>

    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.GoremeTwilight_EN-US3224835148_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>
</head>
<body>
    <a id="background" href="https://github.com" title="As evening settles over the town of Göreme in the heart of the Cappadocia region of Türkiye, dusk reveals a landscape forged by nature and centuries of human presence. This scene is part of Göreme National Park and the Rock Sites of Cappadocia, a UNESCO World Heritage Site inscribed in 1985 for its exceptional combination of early cultural history and geological formations. These formations, often called 'fairy chimneys' or hoodoos, began as layers of volcanic ash that hardened into soft stone following eruptions of ancient Anatolian volcanoes. Over time, wind and water carved the pillars, ridges, and valleys that define the region today."></a>
