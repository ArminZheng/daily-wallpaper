        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.NavajoSandstone_EN-US9496264383_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>

<body>
    <a id="background" href="https://github.com" title="International Rock Day, observed on July 13, celebrates the geologic building blocks beneath our feet and encourages curiosity about how rocks shape Earth's landscapes and history. From ancient tools to modern mineral uses, these solid structures hold clues to volcanic eruptions, shifting continents, and life over millions of years. Few places display that story as vividly as Antelope Canyon, a narrow slot canyon on Navajo Nation land east of Page, Arizona. Carved from Navajo Sandstone by flash floods and erosion, its smooth, flowing walls reveal how water and sediment sculpt rock over time. Sunlight filters through the canyon's narrow openings, creating beams of light that dance across red and orange stone, shaped by centuries of natural forces. On International Rock Day, landscapes like this turn geology into a living gallery—inviting visitors to see rocks not as static objects, but as evolving records of our planet's dynamic past."></a>
