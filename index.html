<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Astronomical clock at Town Hall of the City of Ulm, Germany (© Tomekbudujedomek/Getty Images) 2026-03-08</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link href="favicon.ico" type="image/x-icon" rel="shortcut icon" />
    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.UlmClock_EN-US6692804943_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>
</head>
<body>
    <a id="background" href="https://github.com" title="Every March, Daylight Saving Time begins in most of the United States, shifting clocks forward to maximize daylight. The idea can be traced back to 1784, when Benjamin Franklin humorously suggested earlier rising to conserve candle use. The US adopted Daylight Saving Time much later in 1918 as an energy-saving measure during World War I. After years of uneven observance, the Uniform Time Act of 1966 established a nationwide standard for seasonal clock changes. While most states observe Daylight Saving Time today, Hawaii and Arizona (with the exception of the Navajo Nation) do not, citing minimal daylight variation and climate concerns. Several US territories also remain on standard time year-round."></a>
</body>
</html>
