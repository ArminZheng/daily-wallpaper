    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.AurayBrittany_EN-US7890619884_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>

<body>
    <a id="background" href="https://github.com" title="In France, Port de Saint-Goustan sits just below Auray's upper town, where a small inlet meets the Gulf of Morbihan estuary. The harbor lies at the confluence of the Auray and Loc'h rivers, creating its sheltered, storybook setting. In the 13th century, the Dukes of Brittany built a bridge, a port, and a castle here; the fortress has vanished, but cobbled quays, narrow lanes, and timber-framed houses still line the water. From Place de la République, Rue du Château passes art studios and galleries down to the waterfront; ramps along the Loc'h, built on old fortifications, open views across the port. Cross the four-arched stone bridge to Place Saint-Sauveur, then climb toward Saint-Gildas Church, where the town rises above the harbor. The quay also marks a transatlantic moment: Benjamin Franklin arrived here in 1776, and a dock now bears his name. Today, cafés and small boats fill the scene, while nearby Auray hosts a well-known weekly market and lively summer events."></a>
