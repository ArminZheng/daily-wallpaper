<body>
    <a id="background" href="https://github.com" title="Penguins usually bring Antarctica to mind, but these endearing flightless seabirds don't always follow the ice. On World Penguin Day, the Galápagos penguins pictured here offer a vivid counterpoint. Found only in the Galápagos Islands—a volcanic archipelago about 600 miles off Ecuador's coast—this species lives farther north than any other penguin. Cool, nutrient‑rich ocean currents make this equatorial habitat possible by supplying food and keeping surrounding waters within survivable temperatures. Compact and agile, these birds spend much of the day in the water to stay cool."></a>
