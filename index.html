            /* Maintain the size when the screen width is within 1000px */

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */

<body>
    <a id="background" href="https://github.com" title="Along the rocky coasts of the North Atlantic, Atlantic puffins make their homes in burrows and cliffside crevices. These seabirds, with their black‑and‑white plumage and colorful beaks, are classified by the IUCN as vulnerable, as overfishing and changing ocean conditions reduce the availability of their prey. Each spring, they return to breed, laying a single egg in carefully dug burrows. Remarkable swimmers, they use their wings to 'fly' underwater when hunting small fish such as herring and sand eels."></a>
