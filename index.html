<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Lion's mane jellyfish swimming in the ocean (© Alexander Semenov Images/Shutterstock) 2026-06-08</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link href="favicon.ico" type="image/x-icon" rel="shortcut icon" />
    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.Cyanea_EN-US1146473249_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>
</head>
<body>
    <a id="background" href="https://github.com" title="Today is World Oceans Day, so follow the lead of a creature that goes wherever the water takes it. Want to spot a lion's mane jellyfish? Look in cold northern seas. Its bell is split into eight lobes, and beneath it hang long tentacles and oral arms. As it drifts with the current, stinging cells snare plankton and small fish. For humans, the sting can be painful. Reactions vary, and even a washed-up tentacle can still hurt. The rule is simple: admire it, then leave it alone. Some lion's manes in Arctic waters have bells more than 6 feet across, but most sightings are smaller animals near shore after storms or strong currents."></a>
</body>
