<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Geothermal blue pool Bláhver at Hveravellir, Iceland (© Juan Maria Coy Vergara/Getty Images) 2026-03-10</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link href="favicon.ico" type="image/x-icon" rel="shortcut icon" />
    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.SpringIceland_EN-US6846318257_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>
</head>
<body>
    <a id="background" href="https://github.com" title="Have you ever wondered what happens when fire, ice, and time negotiate the same territory? Iceland's Hveravellir geothermal field has the answer. In this highland hotspot, energy from the Earth's interior meets the icy surface, triggering a volatile dialogue between pressure, temperature, and stone. Fumaroles hiss, steam curls into the air, and the ground paints itself with sulfur whites, rust reds, and ochre yellows—not only artistry, but chemical reactions driven by extreme heat. In today's image, Bláhver, a natural hot spring, dazzles in electric blue. Its color comes from mineral- and silica-rich waters that reflect light on the surface."></a>
</body>
