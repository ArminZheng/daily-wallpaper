<body>
    <a id="background" href="https://github.com" title="Water spills in clean lines at Sgwd yr Eira, one of South Wales' most distinctive waterfalls. Its Welsh name means 'Waterfall of Snow,' referring to the pale curtain of water sliding over the rock face. What sets this waterfall apart is access. A narrow path leads visitors behind the falling water, immersing them in sound, light, and movement at close range. Sgwd yr Eira lies within Bannau Brycheiniog National Park, often called 'Waterfall Country' for its network of rivers and falls carved into wooded gorges. Well-marked trails connect this waterfall to others along the River Hepste, making it a popular stop on longer hikes. Above the valleys, the landscape opens into rolling moorland and long ridgelines where upland paths are shaped by wind and changing weather. These contrasts define the park, where open, exposed uplands give way to sheltered water, tying the landscape together."></a>
