<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Highway through Xitai Jinaier Lake, Qinghai Province, China (© Kaicheng Xu/Getty Images) 2026-06-02</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link href="favicon.ico" type="image/x-icon" rel="shortcut icon" />
    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.Qinghai_EN-US8807254633_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>
</head>
<body>
    <a id="background" href="https://github.com" title="Cutting a surreal path through the high-altitude deserts of western China, Xitai Jinaier Lake (also known as West Taijinar Lake) is a striking salt lake in the remote Qaidam Basin. A stretch of National Highway 315 runs directly across its shallow waters, creating the illusion of a road floating between two worlds. On one side, the water often appears deep blue; on the other, a softer green hue, a contrast shaped by differing mineral concentrations in the brine."></a>
</body>
</html>
