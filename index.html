    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.SpainLighthouse_EN-US0598364035_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>

<body>
    <a id="background" href="https://github.com" title="At Mallorca's far northern tip, in Spain's Balearic Islands, the Formentor Lighthouse stands on the sheer cliffs of Cap de Formentor. This exposed headland is often called the 'Meeting of the Winds.' Built in 1863 and first lit on September 30 of that year, the lighthouse rises nearly 700 feet above the Mediterranean Sea and is reached by a narrow, switchback road about 8 miles from Port de Pollença. Under your feet is pale limestone—rock formed from ancient marine life and later lifted and carved by erosion into dramatic faces, sea caves, and natural arches. This rugged geology gives rise to the area's stark beauty and sense of isolation. Want to earn the view? Follow one of the peninsula's hiking routes, or tackle the short, steep climb to Talaia d'Albercutx for a watchtower panorama before continuing to the lighthouse. Keep an eye on the slopes: wild goats, descended from early domestic herds, spring across the ledges with effortless balance."></a>
