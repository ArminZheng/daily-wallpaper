    <a id="background" href="https://github.com" title="An egg-laying mammal. No teeth. Reptilian gait. Built-in body armor. If the short-beaked echidna sounds like a checklist of contradictions, that's because it is—and it owns it. Native to Australia, Tasmania, and parts of New Guinea, it's one of the few surviving monotremes, or mammals that lay eggs. Despite the headlines, it still qualifies as a mammal: it has fur, produces milk, and is warm-blooded. The twist? Milk is released through specialized skin patches rather than nipples, leaving the young to lap it up."></a>
