<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Hirosaki Castle with cherry blossoms, Hirosaki, Japan (© Glenn Waters/Getty Images) 2026-04-06</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link href="favicon.ico" type="image/x-icon" rel="shortcut icon" />
    <style>
        #background {
            /* Fix the entire element to the top left corner of the screen */
            position: fixed;
            top: 0;
            left: 0;

            /* Make the element the same size as the screen */
            width: 100%;
            height: 100%;

            /* Maintain the size when the screen width is within 1000px */
            /* min-width: 1000px; */

            /* Position the element below other layers to achieve the background image effect */
            z-index: -10;

            /* Compatibility for IE: Set the scaling ratio of the object to automatically expand when floating */
            zoom: 1;

            /* Background image */
            background-image: url("https://www.bing.com/th?id=OHR.CastleBlossoms_EN-US6202844131_UHD.jpg");

            /* Set a white background color when there is no image */
            background-color: #fff;

            /* Do not repeat the background */
            background-repeat: no-repeat;

            /* Position the image at the center and align it to the left */
            background-position: center center;

            /* Scale the image to fit the screen, with some possible cropping to prevent white space */
            background-size: cover;

            /* Same as above, compatibility for Chrome and Opera */
            -webkit-background-size: cover;
            -o-background-size: cover;
        }
    </style>
</head>
<body>
    <a id="background" href="https://github.com" title="Picture northern Japan in the early 1600s. Castles stood at the crossroads of politics, trade, and governance. Across generations, they came to reflect not only moments of tension, but also endurance, adaptation, and everyday life. Castle Day, celebrated on April 6, was created to highlight that layered past. The day uses a simple phonetic link—shi (4) and ro (6)—to form Shiro-no-Hi, because 'shiro' means castle in Japanese. It's a reminder that castles had serious jobs long before they had cinematic appeal."></a>
</body>
</html>
